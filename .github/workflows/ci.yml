name: CI

# The real build/test/lint gate for HazelRust.
#
# Rollout model (see EXECUTION_PLAN.md, Layer 0):
#   * `build` and `test` are BLOCKING — the workspace must compile on stable
#     and the non-ignored test suite must pass on every push and PR.
#   * `fmt`, `clippy`, `audit`, and `deny` start in OBSERVE mode
#     (continue-on-error) so the first runs establish a clean baseline on a
#     codebase that has never had these gates. Each one is ratcheted to
#     BLOCKING (remove its `continue-on-error`) as the corresponding backlog
#     is burned down. Do not let them stay non-blocking indefinitely.
#
# Note: integration tests that require a live Hazelcast cluster are `#[ignore]`
# and are NOT exercised here. Enabling them against a containerized cluster is
# Layer 5 of the execution plan and lands in a dedicated workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (stable, default features) — BLOCKING
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Default features only: portable, fast, representative of the common
      # dependency. The heavy/native optional features (kafka/rdkafka, AWS/Azure/
      # GCP/k8s discovery) are exercised by the non-blocking all-features job.
      - name: cargo build --workspace --locked
        run: cargo build --workspace --locked

  build-all-features:
    name: Build (all features) — observe
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # rdkafka-sys compiles a vendored librdkafka from source via cmake and links
      # against system SASL/OpenSSL/zlib/curl. Without these -dev packages the build
      # fails with "libsasl2 not found" / "curl/curl.h: No such file or directory".
      - name: Install native build dependencies (rdkafka)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libsasl2-dev libssl-dev zlib1g-dev libcurl4-openssl-dev
      # Pulls native deps (rdkafka) and large cloud SDKs; kept non-blocking until
      # the matrix of optional features is known-good on Linux runners.
      - name: cargo build --workspace --all-features --locked
        run: cargo build --workspace --all-features --locked

  test:
    name: Test (stable) — BLOCKING
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Runs unit + non-ignored integration tests (default features).
      # Cluster-dependent tests are #[ignore] and excluded (see Layer 5).
      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked --no-fail-fast

  msrv:
    name: MSRV 1.85 build — observe
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      # The previously-declared MSRV (1.70) was inaccurate — the dependency tree
      # does not build on it. 1.85 is a provisional, CI-verified baseline; pin the
      # exact MSRV by bisection as a follow-up (tracked in EXECUTION_PLAN.md).
      - name: cargo build (MSRV, default features)
        run: cargo build --workspace --locked

  fmt:
    name: Rustfmt — BLOCKING
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  clippy:
    name: Clippy (default features) — observe
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Default features so this runs on Linux (all-features needs native rdkafka).
      # Observe-only: a warning backlog remains (approx_constant in test data,
      # missing-docs, a few dead-code items). Burn it down, then flip to
      # `-- -D clippy::all` blocking — tracked in EXECUTION_PLAN.md.
      - name: cargo clippy --all-targets
        run: cargo clippy --all-targets --locked

  # Supply-chain gate (advisories + licenses + bans + sources). cargo-deny uses
  # the same RustSec advisory DB as cargo-audit and is a strict superset, so it
  # is the single source of truth here (no separate cargo-audit job). Accepted
  # advisories and their justifications live in deny.toml.
  deny:
    name: cargo-deny (advisories/licenses/bans/sources) — BLOCKING
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - name: cargo deny check
        run: cargo deny check
