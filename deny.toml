# cargo-deny configuration — supply-chain gate for HazelRust.
# Run locally with: cargo deny check
# Wired into CI (.github/workflows/ci.yml, `deny` job). Starts in observe mode;
# ratchet to blocking once the dependency tree is clean (see EXECUTION_PLAN.md).

[advisories]
version = 2
# RustSec advisory DB. Vulnerabilities and yanked crates fail by default under
# version = 2. Entries below are accepted only with a written justification and a
# tracked remediation in EXECUTION_PLAN.md. Each must be revisited, not left to rot.
ignore = [
    # tokio-tar — PAX header file smuggling. DEV-ONLY: pulled solely by
    # `testcontainers` (test infrastructure); never compiled into the shipped
    # client. No fixed release exists. Remediation: drop/replace the test-only
    # tar dependency (Layer 5 work). Tracked.
    "RUSTSEC-2025-0111",
    # bincode 1.x — unmaintained (not a vulnerability). Used by the optional
    # `serde` feature. Remediation: evaluate migration to bincode 2.x. Tracked.
    "RUSTSEC-2025-0141",
    # rustls-pemfile — unmaintained (not a vulnerability); functionality folded
    # into rustls-pki-types. Used by the optional `tls` feature for PEM loading.
    # Remediation: migrate to rustls-pki-types. Tracked.
    "RUSTSEC-2025-0134",
]

[licenses]
version = 2
# Permissive licenses compatible with an Apache-2.0 project. Anything not on
# this list must be reviewed before it enters the dependency tree.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MITNFA",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
# Surfacing duplicate versions is useful hygiene but not a launch blocker yet.
multiple-versions = "warn"
wildcards = "warn"
# Disallow crates known to be problematic for an audited build. Extend as needed.
deny = []

[sources]
# Only crates.io and explicitly-allowed git sources are permitted. A central-bank
# build must know the provenance of every dependency.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
